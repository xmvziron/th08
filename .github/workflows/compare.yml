name: Compare reimplementation

on:
  workflow_run:
    workflows: [Build binary]
    types: [completed]
  workflow_dispatch:
    inputs:
      workflow_id:
        required: true
        type: number

env:
  EXPECTED_HASH: 330fbdbf58a710829d65277b4f312cfbb38d5448b3df523e79350b879213d924

jobs:
  compare:
    runs-on: windows-latest

    permissions:
      statuses: write

    steps:
    - name: Report tests check
      if: ${{ github.event_name == 'workflow_run' }}
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: context.payload.workflow_run.head_sha,
            state: 'pending',
            target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            description: 'Comparison checks',
            context: 'comparison-checks',
          })
    - uses: actions/checkout@v3
    - name: Fetch game binary from cache.
      uses: actions/cache@v4
      id: cache
      with:
        path: resources/game.exe
        key: 9f76483c46256804792399296619c1274363c31cd8f1775fafb55106fb852245
    - name: Download original game binary for comparison
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        curl -L $env:ORIGINAL_URL -o resources/game.exe
        $hash = (Get-FileHash resources/game.exe).Hash
        if ($hash -ne $env:EXPECTED_HASH) {
          Write-Host "Downloaded file with unexpected hash."
          Write-Host "Expected: " $env:EXPECTED_HASH
          Write-Host "Got: $hash"
          exit 1
        }
        ORIGINAL_URL: ${{ secrets.ORIGINAL_URL }}
      env:
    - name: Download reimplemented game binary for comparison (1/2)
      uses: actions/github-script@v6
      with:
        script: |
          let allArtifacts = await github.rest.actions.listWorkflowRunArtifacts({
             owner: context.repo.owner,
             repo: context.repo.repo,
             run_id: context.payload.workflow_run ? context.payload.workflow_run.id : context.payload.inputs.workflow_id,
          });
          let matchArtifact = allArtifacts.data.artifacts.filter((artifact) => {
            return artifact.name == "th08e-diff"
          })[0];
          let download = await github.rest.actions.downloadArtifact({
             owner: context.repo.owner,
             repo: context.repo.repo,
             artifact_id: matchArtifact.id,
             archive_format: 'zip',
          });
          let fs = require('fs');
          fs.writeFileSync(`${process.env.GITHUB_WORKSPACE}/th08e.zip`, Buffer.from(download.data));
    - name: Download reimplemented game binary for comparison (2/2)
      run: |
        mkdir recompiled/
        unzip th08.zip -d recompiled/
    - name: Get information on workflow ID
      uses: actions/github-script@v6
      id: workflow_run_info
      with:
        script: |
          // get info from workflow_id
          let workflowRunInfo = await github.rest.actions.getWorkflowRun({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: context.payload.workflow_run ? context.payload.workflow_run.id : context.payload.inputs.workflow_id,
          })
          core.setOutput("head_repository_full_name", workflowRunInfo.data.head_repository.full_name)
          core.setOutput("head_sha", workflowRunInfo.data.head_sha)
          console.log(workflowRunInfo.data.head_repository.full_name, workflowRunInfo.data.head_sha)
    - name: Use reccmp-project.yml from target repo
      run: curl -L https://raw.githubusercontent.com/${{steps.workflow_run_info.outputs.head_repository_full_name}}/${{steps.workflow_run_info.outputs.head_sha}}/reccmp-project.yml -o reccmp-project.yml --fail
    - name: Use reccmp-symbols.csv from target repo
      run: curl -L https://raw.githubusercontent.com/${{steps.workflow_run_info.outputs.head_repository_full_name}}/${{steps.workflow_run_info.outputs.head_sha}}/config/reccmp-symbols.csv -o config/reccmp-symbols.csv --fail
    - name: Use reccmp-strings.csv from target repo
      run: curl -L https://raw.githubusercontent.com/${{steps.workflow_run_info.outputs.head_repository_full_name}}/${{steps.workflow_run_info.outputs.head_sha}}/config/reccmp-strings.csv -o config/reccmp-strings.csv --fail
    - name: Use reccmp-floats.csv from target repo
      run: curl -L https://raw.githubusercontent.com/${{steps.workflow_run_info.outputs.head_repository_full_name}}/${{steps.workflow_run_info.outputs.head_sha}}/config/reccmp-floats.csv -o config/reccmp-floats.csv --fail
    - name: Install reccmp
      run: pip install reccmp
    - name: Setup reccmp
      run: |
        reccmp-project detect --search-path .
        cd recompiled
        reccmp-project detect --what recompiled
    - name: Create diff summary
      working-directory: recompiled
      run: python ../scripts/generate_reccmp_diff.py > $env:GITHUB_STEP_SUMMARY
    - name: Report tests check
      if: ${{ github.event_name == 'workflow_run' && success() }}
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: context.payload.workflow_run.head_sha,
            state: 'success',
            target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            description: 'Comparison checks',
            context: 'comparison-checks',
          })
    - name: Report tests check
      if: ${{ github.event_name == 'workflow_run' && failure() }}
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          github.rest.repos.createCommitStatus({
            owner: context.repo.owner,
            repo: context.repo.repo,
            sha: context.payload.workflow_run.head_sha,
            state: 'failure',
            target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            description: 'Comparison checks',
            context: 'comparison-checks',
          })
